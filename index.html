<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorenz Yap | Photography Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="site-navigation">
        <div class="nav-container">
            <div class="nav-logo">Lorenz Yap Photography</div>
            <div class="nav-links">
                <a href="#what-i-do">What I Do</a>
                <div class="dropdown">
                    <a href="#" class="dropbtn">Info ▾</a>
                    <div class="dropdown-content">
                        <a href="equipment.html">Equipment</a>
                        <a href="about.html">About Me</a>
                    </div>
                </div>
                <a href="#contact">Contact</a>
                <a href="https://instagram.com" target="_blank" class="social-icon">IG</a>
            </div>
        </div>
    </nav>

    <!-- FULL-WIDTH HERO SECTION -->
    <section class="hero">
        <img src="HeroImage.jpg" alt="Hero Photography" class="hero-img">
    </section>

    <div class="portfolio-container">
        <header class="intro-header">
            <p>I focus mostly on wildlife and landscape photography. My goal is to capture the pristine details of nature and share the raw beauty of the outdoors through my lens.</p>
        </header>

        <section class="slider-section">
            <h2 class="section-title">Color Grade Comparison</h2>
            <div class="slider-container" id="sliderContainer">
                <img src="Edit1.jpg" alt="Edited Image" class="slider-img img-after">
                <div class="slider-badge badge-edited">Final Color Grade</div>
                <div class="img-before" id="beforeImg">
                    <img src="Raw1.jpg" alt="RAW Image" class="slider-img">
                    <div class="slider-badge badge-raw">RAW (Hazy Kitlens)</div>
                </div>
                <input type="range" min="0" max="100" value="50" class="slider-input" id="imageSlider">
                <div class="slider-handle" id="sliderHandle"><div class="slider-button">↔</div></div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
