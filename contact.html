        <div class="contact-form-side">
            <h1>Contact me</h1>
            <p>If you have a question or you're interested in collaborating, please provide your information. I'll get back to you as soon as I can!</p>
            <form action="#" method="POST">
                <label>Name</label>
                <div style="display: flex; gap: 20px; margin-top: 10px;">
                    <input type="text" placeholder="First Name" required style="width: 100%; padding: 10px;">
                    <input type="text" placeholder="Last Name" required style="width: 100%; padding: 10px;">
                </div>
                <label style="display: block; margin-top: 20px;">Email (required)</label>
                <input type="email" style="width: 100%; padding: 10px; margin: 10px 0;">
                <label style="display: block;">Message (required)</label>
                <textarea rows="5" style="width: 100%; padding: 10px; margin: 10px 0;"></textarea>
                <button type="submit" style="background:#000; color:#fff; padding: 15px 30px; border:none; cursor:pointer;">Submit</button>
            </form>
